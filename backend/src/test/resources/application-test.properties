# H2 in-memory para testes
spring.datasource.url=jdbc:h2:mem:checkinhub_test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Desabilitar Redis para testes
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT — chave longa o suficiente para HMAC-SHA256 (>= 32 chars)
app.jwt.secret=test-secret-key-must-be-at-least-256bits-long-for-hmacsha
app.jwt.expiration-ms=3600000

# PMS mock
app.pms.base-url=http://localhost:9999
app.pms.api-key=test-key
app.cors.allowed-origins=http://localhost:5173
