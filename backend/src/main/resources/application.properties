spring.application.name=checkin-hub

# =============================================
# Servidor
# =============================================
server.port=8080

# =============================================
# Oracle Database
# =============================================
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${ORACLE_USER:checkinhub}
spring.datasource.password=${ORACLE_PASS:checkinhub123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Redis
# =============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASS:}

# =============================================
# JWT
# =============================================
app.jwt.secret=${JWT_SECRET:3cHm9K8vXqL2pN5rT7wZ0jF4dY1sU6bE}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# =============================================
# PMS Adapter (mock | opera | totvs)
# =============================================
app.pms.adapter=${PMS_ADAPTER:mock}

# =============================================
# CORS — origens permitidas
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

# =============================================
# Actuator (health check)
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
