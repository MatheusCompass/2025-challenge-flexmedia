services:

  # ─── Oracle XE 21c ────────────────────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: checkinhub-oracle
    environment:
      ORACLE_PASSWORD: Oracle21c!
      APP_USER: checkinhub
      APP_USER_PASSWORD: checkinhub123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - checkinhub-net

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: checkinhub-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - checkinhub-net

  # ─── Backend Spring Boot ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: checkinhub-backend
    environment:
      ORACLE_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1
      ORACLE_USER: checkinhub
      ORACLE_PASS: checkinhub123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASS: ""
      JWT_SECRET: 3cHm9K8vXqL2pN5rT7wZ0jF4dY1sU6bE
      JWT_EXPIRATION: "86400000"
      PMS_ADAPTER: mock
      CORS_ORIGINS: http://localhost,http://localhost:80
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - checkinhub-net

  # ─── Frontend Totem (Nginx) ───────────────────────────────────────────────
  frontend-totem:
    build:
      context: ./frontend-totem
      dockerfile: Dockerfile
    container_name: checkinhub-totem
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - checkinhub-net

  # ─── Frontend Admin (Nginx) ───────────────────────────────────────────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: checkinhub-admin
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - checkinhub-net

volumes:
  oracle_data:
  redis_data:

networks:
  checkinhub-net:
    driver: bridge
